name: Build, verify and deploy Docker app to Azure Web App - midoc-web-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "production"
        type: choice
        options:
          - staging
          - production

env:
  APP_DIR: consultorio-app
  IMAGE_NAME: midoc/consultorio-app
  NODE_VERSION: "22.x"

jobs:
  verify:
    name: Verify consultorio-app
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: consultorio_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d consultorio_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/consultorio_test?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/consultorio_test?schema=public
      NEXTAUTH_SECRET: ci_nextauth_secret_min_32_chars_for_tests
      APP_BASE_URL: http://localhost:3000
      APP_TIMEZONE: America/Chihuahua
      QUESTIONNAIRE_TOKEN_SECRET: ci_questionnaire_secret_min_32_chars
      TERMS_VERSION: v1
      PRIVACY_VERSION: v1
      PAYMENTS_PROVIDER: STRIPE
      PAYMENTS_WEBHOOK_SECRET: ci_payments_webhook_secret
      STRIPE_SECRET_KEY: sk_test_ci_placeholder_1234567890
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder_1234567890
      NOTIFICATION_CRON_SECRET: ci_notification_cron_secret
      WHATSAPP_WEBHOOK_SECRET: ci_whatsapp_webhook_secret
      WHATSAPP_BOT_API_SECRET: ci_internal_bot_secret_min_16
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate environment contract
        run: npm run env:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ vars.AZURE_ACR_NAME }}"

      - name: Build and push image
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::12}"
          TARGET="${{ github.event.inputs.target || 'production' }}"
          IMAGE_BASE="${{ vars.AZURE_ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}"
          IMAGE_SHA="${IMAGE_BASE}:${SHORT_SHA}"
          IMAGE_TARGET="${IMAGE_BASE}:${TARGET}"

          docker build -t "${IMAGE_SHA}" -t "${IMAGE_TARGET}" "${{ env.APP_DIR }}"
          docker push "${IMAGE_SHA}"
          docker push "${IMAGE_TARGET}"

          echo "image=${IMAGE_SHA}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy Docker image to Azure Web App
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      id-token: write
    environment: ${{ github.event.inputs.target || 'production' }}
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: ${{ vars.AZURE_WEBAPP_SLOT || 'Production' }}
          images: ${{ needs.docker.outputs.image }}

      - name: Warm up health endpoints
        shell: bash
        run: |
          set -euo pipefail
          BASE_URL="${{ vars.APP_BASE_URL }}"
          curl --fail --retry 10 --retry-delay 10 "${BASE_URL}/api/health"
          curl --fail --retry 10 --retry-delay 10 "${BASE_URL}/api/health/ready"
